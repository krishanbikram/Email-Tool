version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: emailtool_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-emailtool}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-emailtool}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-emailtool}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: emailtool_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailtool_backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-emailtool}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-emailtool}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emailtool_frontend
    restart: always
    networks:
      - public

  nginx:
    image: nginx:alpine
    container_name: emailtool_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - public

networks:
  internal:
  public:

volumes:
  postgres_data:
  redis_data:
