version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: emailtool_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-emailtool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emailtool123}
      POSTGRES_DB: ${DB_NAME:-emailtool}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-emailtool}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emailtool_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailtool_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-emailtool}:${DB_PASSWORD:-emailtool123}@postgres:5432/${DB_NAME:-emailtool}
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emailtool_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: emailtool_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
